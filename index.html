<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FRC Scout</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">

  <meta name="theme-color" content="#0f172a">
</head>
<body>

  <div class="container">

    <h1>FRC Match Scout</h1>

    <form id="scoutForm">

      <label>Match Number</label>
      <input type="number" id="match" required>

      <label>Team Number</label>
      <input type="number" id="team" required>

      <label>Scout Name</label>
      <input type="text" id="scout" required>

      <label>Auto Score</label>
      <input type="number" id="autoScore" value="0">

      <label>Teleop Score</label>
      <input type="number" id="teleopScore" value="0">

      <label>Endgame</label>
      <select id="endgame">
        <option>None</option>
        <option>Park</option>
        <option>Climb</option>
      </select>

      <label>Defense Rating (1–5)</label>
      <input type="number" id="defense" min="1" max="5" value="3">

      <label>Fouls</label>
      <input type="number" id="fouls" value="0">

      <label>Notes</label>
      <textarea id="notes"></textarea>

      <button type="submit">Submit Match Data</button>

    </form>

    <div id="status"></div>

  </div>

  <script src="app.js"></script>

</body>
</html>
